<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="vngGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- VNG achtergrond box -->
  <rect x="0" y="0" width="120" height="40" rx="4" fill="url(#vngGradient)"/>
  
  <!-- VNG tekst -->
  <text x="10" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">VNG</text>
  
  <!-- Realisatie tekst -->
  <text x="50" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="white" opacity="0.9">REALISATIE</text>
  
  <!-- Kleine icoon/accent -->
  <circle cx="105" cy="20" r="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="105" cy="20" r="4" fill="white"/>
</svg>
